services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-api-local:dev
    container_name: new-api-dev
    restart: unless-stopped
    init: true
    command: ["--port", "3000", "--log-dir", "/app/logs"]
    ports:
      - "3001:3000"
    env_file:
      - .env.dev
    environment:
      SQLITE_PATH: /data/one-api.db
      TARGET_DATA_DIR: /data
      LEGACY_SEED_ROOT: /seed/workspace
      ENABLE_LEGACY_SEED: "true"
    volumes:
      - ./data-dev:/data
      - ./logs-dev:/app/logs
      - ./:/seed/workspace:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:3000/api/status | grep -Eq '\"success\":[[:space:]]*true'",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
