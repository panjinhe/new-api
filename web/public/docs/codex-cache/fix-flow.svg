<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Codex cache fix flow">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0891b2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="#f8fafc"/>
  <text x="70" y="70" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">修复链路：把 prompt_cache_key 同步为 Codex 上游 Session_id</text>
  <text x="70" y="101" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">Direct Codex backend accepts prompt cache only when the request carries a stable session header.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="70" y="150" width="230" height="150" rx="20" fill="#ffffff" filter="url(#shadow)"/>
    <text x="96" y="192" font-size="18" font-weight="800" fill="#0f172a">客户端请求</text>
    <text x="96" y="224" font-size="14" fill="#475569">JSON 里有</text>
    <text x="96" y="250" font-size="15" font-weight="700" fill="#0891b2">prompt_cache_key</text>
    <text x="96" y="276" font-size="13" fill="#64748b">但不一定带 Session_id 头</text>

    <line x1="320" y1="225" x2="430" y2="225" stroke="#0891b2" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="450" y="138" width="300" height="174" rx="20" fill="#ecfeff" filter="url(#shadow)"/>
    <text x="476" y="180" font-size="18" font-weight="800" fill="#0f172a">new-api Codex 适配器</text>
    <text x="476" y="214" font-size="14" fill="#475569">如果没有 session_id</text>
    <text x="476" y="242" font-size="15" font-weight="700" fill="#0f766e">Session_id = prompt_cache_key</text>
    <text x="476" y="270" font-size="13" fill="#64748b">保留用户显式传入的 Session_id</text>

    <line x1="770" y1="225" x2="880" y2="225" stroke="#0891b2" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="900" y="150" width="230" height="150" rx="20" fill="#ffffff" filter="url(#shadow)"/>
    <text x="926" y="192" font-size="18" font-weight="800" fill="#0f172a">Codex 上游</text>
    <text x="926" y="224" font-size="14" fill="#475569">识别稳定会话</text>
    <text x="926" y="250" font-size="15" font-weight="700" fill="#0891b2">返回 cached_tokens</text>
    <text x="926" y="276" font-size="13" fill="#64748b">命中时 2816 / 3020</text>
  </g>
</svg>
