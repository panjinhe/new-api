<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Codex-pro20x-1 cache hit comparison chart">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="after" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <rect x="44" y="42" width="1112" height="476" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <text x="80" y="92" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">Codex-pro20x-1 缓存命中修复前后对比</text>
  <text x="80" y="124" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">同一 channel 9、同一稳定前缀、同一 prompt_cache_key 语义；数据来自线上使用日志。</text>

  <line x1="100" y1="438" x2="1080" y2="438" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="100" y1="188" x2="1080" y2="188" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="100" y1="313" x2="1080" y2="313" stroke="#e2e8f0" stroke-width="1"/>
  <text x="68" y="194" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">100%</text>
  <text x="75" y="319" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">50%</text>
  <text x="84" y="443" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">0</text>

  <g transform="translate(180 0)">
    <rect x="0" y="438" width="170" height="0" rx="12" fill="#ef4444"/>
    <circle cx="85" cy="438" r="8" fill="#ef4444"/>
    <text x="85" y="404" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#ef4444">0%</text>
    <text x="85" y="464" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">修复前</text>
    <text x="85" y="488" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">6 / 6 轮 cached_tokens = 0</text>
  </g>

  <g transform="translate(520 0)">
    <rect x="0" y="205" width="170" height="233" rx="12" fill="url(#after)"/>
    <text x="85" y="183" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0891b2">93.2%</text>
    <text x="85" y="464" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">命中时单次比例</text>
    <text x="85" y="488" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">2816 / 3020 prompt tokens</text>
  </g>

  <g transform="translate(860 0)">
    <rect x="0" y="250" width="170" height="188" rx="12" fill="#0f766e"/>
    <text x="85" y="226" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f766e">75%</text>
    <text x="85" y="464" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">修复后稳定性</text>
    <text x="85" y="488" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">8 轮中 6 轮命中缓存</text>
  </g>

  <rect x="78" y="148" width="254" height="42" rx="21" fill="#fee2e2"/>
  <text x="205" y="175" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#991b1b">问题状态：连续完全不命中</text>
  <rect x="78" y="198" width="314" height="42" rx="21" fill="#cffafe"/>
  <text x="235" y="225" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#155e75">修复状态：同前缀开始返回 cached_tokens</text>
</svg>
